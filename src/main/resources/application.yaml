server:
  port: 8080

spring:
  ai:
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      api-key: ${SPRING_AI_OLLAMA_API_KEY}

      chat:
        options:
          model: glm-4.7:cloud

      embedding:
        options:
          model: nomic-embed-text

    vectorstore:
      qdrant:
        host: ${SPRING_AI_VECTORSTORE_QDRANT_HOST:localhost}
        port: ${SPRING_AI_VECTORSTORE_QDRANT_PORT:6334}
        collection-name: rag_chunks
        initialize-schema: true

logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.web.client: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html

rag:
  chunk:
    size: 1000
    overlap: 200

  retrieval:
    top-k: 5
    similarity-threshold: 0.0

  documents:
    max-file-size: 52428800